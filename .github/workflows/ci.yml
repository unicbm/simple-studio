name: ci

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  windows-checks:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install frontend dependencies
        run: npm ci

      - name: Frontend tests
        run: npm test

      - name: Frontend build
        run: npm run build

      - name: Rust tests
        working-directory: src-tauri
        run: cargo test
